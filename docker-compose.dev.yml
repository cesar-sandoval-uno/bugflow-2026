services:
  postgres:
    image: postgres:16
    container_name: bugflow-postgres
    restart: always
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bugflow -d bugflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bugflow-api-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command:
      [
        "npx",
        "ts-node-dev",
        "--respawn",
        "--transpile-only",
        "-r",
        "tsconfig-paths/register",
        "api/src/main.ts"
      ]
    environment:
      - TS_NODE_PROJECT=api/tsconfig.app.json
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - NX_DAEMON=false
    ports:
      - '3000:3000'
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bugflow-web-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: npx nx serve web --host 0.0.0.0
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - '4200:4200'
    depends_on:
      - api

volumes:
  postgres_data: