@if (toast()) {
  <div class="fixed bottom-4 right-4 z-50">
    <div
      class="px-4 py-3 rounded-xl shadow-lg text-white min-w-[250px]"
      [ngClass]="{
        'bg-red-500': toast()?.type === 'error',
        'bg-green-500': toast()?.type === 'success',
        'bg-blue-500': toast()?.type === 'info'
      }"
      role="alert"
      aria-live="assertive"
    >
      {{ toast()?.message }}
    </div>
  </div>
}
