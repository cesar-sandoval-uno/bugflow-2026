<main
  class="min-h-screen bg-gradient-to-br from-blue-50 to-white flex items-center justify-center px-4"
>
  <section
    class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-md text-center"
    aria-labelledby="welcome-title"
  >

    <app-logo size="lg"></app-logo>

    <p class="text-muted mb-6">
      Collaborative bug tracking made simple.
    </p>

    <div
      class="bg-gray-50 border rounded-lg p-4 mb-6 text-sm text-gray-600"
      role="status"
    >
      You are not authenticated. Please login to continue.
    </div>

    <app-button
      text="Login with Auth0"
      (clicked)="login()"
      [isLoading]="false"
      ariaLabel="Login with Auth0"
    ></app-button>

  </section>
</main>
