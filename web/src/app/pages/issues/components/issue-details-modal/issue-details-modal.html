@if (isOpen() && issue(); as currentIssue) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4"
    (click)="close()"
  >
    <div
      class="max-h-[90vh] w-full max-w-4xl overflow-y-auto rounded-2xl bg-white p-6"
      (click)="$event.stopPropagation()"
      role="dialog"
      aria-modal="true"
      aria-labelledby="issue-details-title"
    >
      <div class="mb-6 flex items-start justify-between gap-4">
        <div class="space-y-2">
          <div class="flex items-center gap-3">
            <h2
              id="issue-details-title"
              class="text-2xl font-bold"
            >
              {{ currentIssue.title }}
            </h2>
            <app-badge
              [status]="currentIssue.status"
              size="sm"
            />
          </div>
          <div
            class="flex flex-wrap items-center gap-3 text-sm text-gray-500"
          >
            <span>
              Priority:
              <strong class="capitalize">
                {{ currentIssue.priority }}
              </strong>
            </span>
            <span>
              Project:
              <strong>
                {{
                  currentIssue.project?.name ||
                  'No project'
                }}
              </strong>
            </span>
            <span>
              Assignee:
              <strong>
                {{
                  currentIssue.assignee?.name ||
                  'Unassigned'
                }}
              </strong>
            </span>
          </div>
        </div>

        <button
          type="button"
          (click)="close()"
          class="rounded-lg p-2 text-gray-500 hover:bg-gray-100"
          aria-label="Close modal"
        >
          ✕
        </button>
      </div>

      <div class="mb-8 rounded-2xl bg-gray-50 p-4">
        <h3 class="mb-2 font-semibold">
          Description
        </h3>
        <p class="whitespace-pre-wrap text-gray-700">
          {{ currentIssue.description }}
        </p>
      </div>

      <app-comments
        [issueId]="currentIssue.id"
      />

    </div>
  </div>
}
