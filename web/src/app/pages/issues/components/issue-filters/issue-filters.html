<div
  class="bg-white p-4 rounded-2xl shadow"
  role="region"
  aria-labelledby="filters-title"
>
  <h2 id="filters-title" class="sr-only">
    Issue filters
  </h2>

  <div class="flex gap-4 items-center mb-2 flex-wrap">

    <!-- Project -->
    <div class="flex flex-col">
      <label
        for="project"
        class="text-sm font-medium"
      >
        Project
      </label>
      <select
        id="project"
        class="border rounded-lg px-3 py-2"
        [value]="filters().projectId"
        (change)="updateProject($any($event.target).value)"
      >
        <option value="">
          All projects
        </option>
        <option value="none">
          No project
        </option>
        @for (project of projects; track project.id) {
          <option [value]="project.id">
            {{ project.name }}
          </option>
        }
      </select>
    </div>

    <!-- Status -->
    <div class="flex flex-col">
      <label for="status" class="text-sm font-medium">
        Status
      </label>
      <select
        id="status"
        class="border rounded-lg px-3 py-2"
        [value]="filters().status"
        (change)="updateStatus($any($event.target).value)"
      >
        <option value="">All statuses</option>
        @for (status of statuses; track status) {
          <option
            [value]="status"
            [selected]="filters().status === status"
          >
            {{ status }}
          </option>
        }
      </select>
    </div>

    <!-- Priority -->
    <div class="flex flex-col">
      <label for="priority" class="text-sm font-medium">
        Priority
      </label>
      <select
        id="priority"
        class="border rounded-lg px-3 py-2"
        [value]="filters().priority"
        (change)="updatePriority($any($event.target).value)"
      >
        <option value="">All priorities</option>
        @for (priority of priorities; track priority) {
          <option
            [value]="priority"
            [selected]="filters().priority === priority"
          >
            {{ priority }}
          </option>
        }
      </select>
    </div>

    <!-- Search -->
    <div class="flex flex-col">
      <label for="search" class="text-sm font-medium">
        Search issues
      </label>
      <input
        id="search"
        type="search"
        autocomplete="off"
        class="border rounded-lg px-3 py-2"
        [value]="filters().search"
        (input)="updateSearch($any($event.target).value)"
      />
    </div>

    <!-- Clear -->
    <button
      class="ml-auto text-sm text-gray-500 hover:text-black"
      (click)="clearFilters()"
      type="button"
      aria-label="Clear all filters"
    >
      Clear filters
    </button>

  </div>

  <!-- Results -->
  <p
    class="text-sm text-gray-500"
    aria-live="polite"
  >
    {{ issuesLength }} issue@if (issuesLength !== 1) {s} found
    @if (filters().status || filters().priority || filters().search) {
      <span class="text-gray-400"> (Filters active)</span>
    }
  </p>
</div>
