<div class="p-6 space-y-6">
  <div class="flex justify-between items-center mb-3">
    <h1 class="text-2xl font-bold">Issues</h1>
    <button
      class="bg-blue-600 text-white px-4 py-2 rounded-xl"
      (click)="openCreateModal()"
      type="button"
    >
      + Create Issue
    </button>
  </div>

  @let state = facade.issuesState();

  <app-issue-filters
    [filters]="facade.filtersState"
    [issuesLength]="state.data.length"
    [projects]="projectsFacade.projectsState().data"
  ></app-issue-filters>

  @if (state.loading) {
    <app-spinner></app-spinner>
  } @else {
    <div class="grid gap-2 sm:grid-cols-2 lg:grid-cols-3">
      @for (issue of state.data; track issue.id) {
        <app-card
          ariaLabel="Issue item"
          role="article"
          class="h-full gap-5"
          [attr.aria-label]="'Issue ' + issue.title"
          [attr.aria-labelledby]="'issue-title-' + issue.id"
        >
          <div class="flex justify-between items-start gap-4">
            <div class="flex-1 min-w-0 space-y-2">
              <h2 [id]="'issue-title-' + issue.id" class="font-semibold">
                {{ issue.title }}
              </h2>
              <p
                class="text-sm text-gray-500 truncate"
                [attr.title]="issue.description"
              >{{ issue.description }}</p>
              <button
                type="button"
                (click)="openDetails(issue)"
                class="text-sm font-medium text-blue-600 hover:underline"
              >
                View details
              </button>
            </div>

            <div class="flex items-start gap-2">
              <app-context-menu
                [items]="getMenuItems(issue)"
              />
            </div>
          </div>
          <div class="mt-auto space-y-3">
            <div class="flex flex-wrap items-center justify-end gap-3 text-sm">
              <app-badge
                [status]="issue.status"
                size="sm"
              />
              <span class="text-xs text-gray-400">
                {{ issue.project?.name || 'No project' }}
              </span>
              <span class="capitalize">
                {{ issue.priority }}
              </span>
            </div>
            <div class="flex justify-end">
              <div
                class="inline-flex items-center gap-2 whitespace-nowrap rounded-full bg-gray-100 px-3 py-1 text-sm text-gray-700"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-4 w-4 text-gray-500"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    d="M5.121 17.804A9 9 0 1118.88 17.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"
                  />
                </svg>
                <span>
                  {{ issue.assignee?.name || 'Unassigned' }}
                </span>
              </div>
            </div>
          </div>
        </app-card>
      }
    </div>
  }

</div>

<app-create-issue-modal />
<app-issue-details-modal />
