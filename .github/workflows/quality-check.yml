name: Quality Check

on:
  pull_request:
    branches:
      - dev
      - main

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx run-many --target=lint --all

      - name: Backend Tests
        run: npx nx test api

      - name: Frontend Tests
        run: npx nx test web